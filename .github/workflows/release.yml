name: release

# 推送 v* 標籤即建置 Windows 安裝檔並發佈到 GitHub Releases
# 例：git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '發佈用標籤（例如 v0.1.0）'
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build & publish (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "製程 AGV 模擬系統 ${{ github.event.inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: false
          releaseBody: |
            ## 製程 AGV 模擬系統 — 桌面版（Windows）

            使用系統 WebView2，**可離線使用**。下方 **Assets** 內含安裝檔。

            > v0.3.4：桌面版匯出可自選儲存路徑（原生「另存新檔」對話框）。

            ### 本次更新（v0.3.4）
            - **匯出可自選路徑**：桌面版 PNG／CSV／情境與製程線 JSON 匯出，改跳原生「另存新檔」對話框自選位置與檔名；存好後顯示完整路徑。瀏覽器版維持直接下載。以底層 IPC 實作、不啟用 withGlobalTauri，已用真實 WebView2 驗證頁面正常載入。

            ### v0.3.0
            - **目標累加延長**：達標出結果後再按「▶ 播放」或「⏩ 立即結果」，目標以原目標為基數累加（4000 → 8000 → 12000…）並接續模擬，不再一播放就停。
            - **統計圖表收合／覆蓋**：圖表預設收合，一鍵展開為覆蓋主畫面的大圖，支援**滾輪縮放**與**拖曳左右平移**，可一鍵重置；收合時於工具列顯示迷你摘要。
            - **立即結果也有曲線**：快轉至達標時以產出時間戳回填整條 UPH 曲線（長時間自動降採樣），不再空白。
            - **y 軸自動上限**：依目前 UPH 峰值取整調整，曲線不貼頂、刻度更清楚。

            ### 功能亮點
            - **結果匯出**：一鍵 **PNG 圖片報告**（摘要 + 瓶頸 + AGV 稼動 + UPH 趨勢圖）與 **CSV** 資料。
            - **方案比較表**：釘選多次模擬結果並排比較，標示最佳值。
            - **瓶頸建議**：對最重瓶頸站建議增加設備數，並可「套用 +1 並重跑」。
            - **深色模式**、**鍵盤快捷鍵**（Space / → / 1 2 5 / R / P / Esc）。
            - **無障礙強化**：焦點環、語意標籤、彈窗 focus trap、里程碑語音播報、色盲友善 AGV 標記（●滿 / ○空）、首次使用引導。

            ### 安裝
            1. 下載 `ProcessAGVSim_*_x64-setup.exe`（NSIS）或 `*.msi`。
            2. 執行並依指示安裝，從開始選單啟動「製程 AGV 模擬系統」。
            3. 若提示缺 WebView2，安裝 Microsoft Edge WebView2 Runtime（Win10/11 多已內建）。

            ### 操作說明
            1. **選擇製程線**：啟動後於首頁選 ABF / SMK / 自訂線。
            2. **播放控制**：▶ 播放、1× / 2× / 5× / 10× 倍速、⏩ 立即結果（快轉至達標）、↺ 重置、⇄ 切換線。鍵盤：`Space` 播放/暫停、`→` 立即結果、`1/2/5` 速度、`R` 重置、`P` 參數、`Esc` 關閉彈窗。
            3. **參數調整**：右上「⚙ 參數」開面板 → 改製程時間 / 路段行走 / 設備數量（機台、AGV、烤箱容量）等 → 按「套用」重新模擬；可存成情境、匯入匯出。秒類欄位顯示分鐘換算。
            4. **產能觀察**：滑鼠移到站別看每小時與平均 UPH；底部為 UPH 折線圖；右側即時統計、瓶頸警示與建議。
            5. **匯出與比較**：完成視窗或「📊 看板」可「🖼 匯出 PNG / CSV」；「📋 比較」開方案比較表，按「📌 釘選」累積方案並排比較。
            6. **AGV 稼動看板**：「📊 看板」檢視每台 AGV 的移動 / 取放 / 閒置時間與稼動率。
            7. **流程圖縮放**：滾輪縮放、拖曳平移，「⤢ 重置視角」歸位。
            8. **外觀**：右上「🌙 深色 / ☀ 淺色」切換主題（記憶）；「？」可重看操作提示。
            9. **自訂製程線**：選擇畫面「＋ 新增製程線」用精靈建立（站別→時間→每組 AGV→驗證/乾跑→儲存）；自訂線可編輯 / 刪除 / 匯出 JSON。
