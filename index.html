<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欣興電子 ABF+SMK 製程 AGV 模擬系統</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#eef2f8;--surface:#ffffff;--card:#f3f6fb;--border:#cdd8e8;--text:#18233a;--dim:#5a6a85;--accent:#0a6ebd;--green:#00922f;--yellow:#b8860b;--orange:#d9600a;--red:#cc1111;--abf:#1565c0;--smk:#d9600a;
  --g1:#0277bd;--g2:#00853a;--g3:#7b2fbf;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* ── 兩列式 header：上=資訊列 下=控制列 ── */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:13px;flex-shrink:0}
#logo-hdr{height:50px;width:auto;flex-shrink:0}
#hdr-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
#hdr-info{display:flex;align-items:center;gap:16px}
#hdr-ctrl{display:flex;align-items:center;gap:8px}
#ttl{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
#clk{font-family:'Courier New',monospace;font-size:22px;color:var(--yellow);min-width:96px}
.cg{display:flex;gap:4px;align-items:center;flex-shrink:0}
.hdr-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;margin:0 2px}
button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s}
button:hover{border-color:var(--accent);color:var(--accent)}
button.act{background:var(--accent);color:#fff;border-color:var(--accent)}
button.rst:hover{border-color:var(--red);color:var(--red)}
/* segmented speed control */
.seg{display:flex;flex-shrink:0}
.seg button{border-radius:0;padding:5px 10px;border-right-width:0}
.seg button:first-child{border-radius:4px 0 0 4px}
.seg button:last-child{border-radius:0 4px 4px 0;border-right-width:1px}
/* primary action */
button.pri{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
button.pri:hover{color:#fff;filter:brightness(1.08)}
/* progress + 完成片數（資訊列右側） */
#prog{flex:1;display:flex;align-items:center;gap:10px;min-width:150px}
#pbl{font-size:14px;font-weight:600;white-space:nowrap;color:var(--text);font-variant-numeric:tabular-nums}
#pbw{flex:1;background:var(--card);border:1px solid var(--border);border-radius:4px;height:16px;position:relative;overflow:hidden;min-width:80px}
#pb{height:100%;background:linear-gradient(90deg,var(--abf),var(--accent));width:0%;transition:width .4s}
#main{display:flex;flex:1;overflow:hidden}
#fw{flex:1;display:flex;flex-direction:column;overflow:hidden}
#fsvg{width:100%;flex:1;min-height:0}
#bot-toggle{display:flex;align-items:center;gap:6px;padding:3px 10px;background:var(--surface);border-top:1px solid var(--border);cursor:pointer;flex-shrink:0;user-select:none;font-size:11px;color:var(--dim);transition:color .15s}
#bot-toggle:hover{color:var(--accent)}
#bot-toggle .arrow{transition:transform .25s;font-size:10px}
#bot-toggle.collapsed .arrow{transform:rotate(180deg)}
#bot{display:flex;height:155px;border-top:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:height .25s ease}
#bot.collapsed{height:0;border-top:none}
#cw{flex:1;padding:6px}
#sp{width:255px;padding:10px;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:6px;overflow-y:auto;font-size:12px}
.sr{display:flex;justify-content:space-between;align-items:center}
.sl{font-size:11px;color:var(--dim)}
.sv{font-size:13px;font-weight:600}
.sv.abf{color:var(--abf)}.sv.smk{color:var(--smk)}.sv.grn{color:var(--green)}.sv.red{color:var(--red)}
.bb{background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:3px}
.nob{color:var(--green);font-size:11px}
#sb{width:0;overflow:hidden;transition:width .3s;border-left:1px solid var(--border);background:var(--surface);flex-shrink:0}
#sb.open{width:300px}
#sbi{width:300px;display:flex;flex-direction:column;height:100%}
#sb-scroll{flex:1;overflow-y:auto;padding:12px 12px 6px}
.pg{margin-bottom:9px}
.pg label{display:block;font-size:11px;color:var(--dim);margin-bottom:3px}
.pg input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:12px}
/* stepper input group */
.stp{display:flex;align-items:stretch;gap:0}
.stp input{border-radius:0;text-align:center;min-height:32px}
.stp button{min-width:34px;min-height:32px;padding:0;font-size:16px;line-height:1;border-radius:0;background:var(--card)}
.stp button:first-child{border-radius:4px 0 0 4px;border-right:none}
.stp button:last-child{border-radius:0 4px 4px 0;border-left:none}
.pg .unit{font-size:10px;color:var(--dim);margin-left:4px}
.pg.invalid input{border-color:var(--red)}
.pg .err{display:none;font-size:10px;color:var(--red);margin-top:2px}
.pg.invalid .err{display:block}
/* live / resim tag */
.ptag{font-size:9px;font-weight:600;padding:0 4px;border-radius:3px;margin-left:5px;vertical-align:middle}
.ptag.live{background:#dff3d0;color:#2f7d18;border:1px solid #9fd182}
.ptag.resim{background:#efe3f8;color:#7b2fbf;border:1px solid #d3b8e8}
/* accordion section */
.sec{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden}
.sec-h{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;user-select:none;background:var(--card);font-size:12px;font-weight:600}
.sec-h:hover{color:var(--accent)}
.sec-h .arr{margin-left:auto;font-size:10px;transition:transform .2s}
.sec.closed .sec-h .arr{transform:rotate(-90deg)}
.sec-b{max-height:1600px;overflow:hidden;transition:max-height .25s ease;padding:9px}
.sec.closed .sec-b{max-height:0;padding-top:0;padding-bottom:0}
.sec-cnt{font-size:9px;color:var(--dim);font-weight:400}
/* persistent header block */
.phd{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:9px;margin-bottom:8px}
.phd select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:12px}
/* sticky footer */
#sb-ft{border-top:1px solid var(--border);background:var(--surface);padding:8px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
#dirty-ind{font-size:10px;min-height:13px;color:var(--yellow)}
#dirty-ind.clean{visibility:hidden}
#dirty-ind.live{color:#2f7d18}
#sb-ft .ftrow{display:flex;gap:6px;align-items:center}
#btn-apply{flex:1;background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
#btn-apply.hot{box-shadow:0 0 0 2px var(--accent)}
#btn-apply:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.ftrow label.chk{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:3px;cursor:pointer;white-space:nowrap}
#sb-ft .mini{font-size:11px;padding:4px 6px}
#sbttl{font-size:13px;font-weight:600;color:var(--accent)}
/* route mini-map */
#route-map{width:100%;height:74px;margin-bottom:8px}
#route-map .rseg{stroke:#3a5a80;stroke-width:2;cursor:pointer}
#route-map .rseg.hot{stroke:var(--accent);stroke-width:3.5}
#route-map text{fill:#8090b0;font-size:8px;text-anchor:middle}
.pg.hot input{border-color:var(--accent)}
/* comparison card */
#cmp-card{position:fixed;right:18px;bottom:18px;z-index:120;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:12px 16px;font-size:12px;min-width:210px;box-shadow:0 4px 20px #000a;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none}
#cmp-card.show{opacity:1;transform:translateY(0);pointer-events:auto}
#cmp-card h4{font-size:12px;color:var(--accent);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
#cmp-card .cmpx{cursor:pointer;color:var(--dim);font-size:14px}
#cmp-card .crow{display:flex;justify-content:space-between;gap:14px;margin:3px 0}
#cmp-card .up{color:var(--green)}#cmp-card .dn{color:var(--red)}#cmp-card .eq{color:var(--dim)}
.track{stroke:#2a3a5c;stroke-width:2.5;fill:none}
.track-ret{stroke:#1a2a4c;stroke-width:1.5;fill:none;stroke-dasharray:5 4}
.bnk{stroke:#d50000;stroke-dasharray:8 4;animation:pls .9s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes mproc{0%,100%{opacity:1;filter:brightness(1)}50%{opacity:.75;filter:brightness(1.4)}}
.slb{fill:#18233a;font-size:11px;text-anchor:middle;dominant-baseline:middle}
.llb{fill:#2a3550;font-size:16px;font-weight:700}
.llb2{fill:var(--dim);font-size:11px}
#ov{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:2px solid var(--green);border-radius:8px;padding:24px 32px;text-align:center;z-index:100}
#ov.show{display:block}
#ov h2{color:var(--green);margin-bottom:8px}
.agv-proc{animation:mproc 1s infinite}
/* station UPH tooltip */
#stn-tip{position:fixed;z-index:300;display:none;background:#1b2740;color:#eaf0fa;border:1px solid var(--accent);border-radius:7px;padding:8px 11px;font-size:12px;line-height:1.5;box-shadow:0 6px 22px #0007;pointer-events:none;min-width:130px}
#stn-tip .tt-h{font-weight:700;color:#9ecbff;margin-bottom:4px;border-bottom:1px solid #33456b;padding-bottom:3px}
#stn-tip .tt-r{display:flex;justify-content:space-between;gap:16px}
#stn-tip .tt-now{color:#ffd54a}
#stn-tip .tt-avg{margin-top:4px;border-top:1px solid #33456b;padding-top:3px;font-weight:700}
#stn-tip .tt-dim{color:#8fa0bf}
/* AGV utilization board overlay */
#agv-board{display:none;position:fixed;inset:0;z-index:250;background:#0b1322cc;align-items:center;justify-content:center}
#agv-board.show{display:flex}
#agv-board .abx{background:var(--surface);border:2px solid var(--accent);border-radius:10px;padding:18px 22px;max-height:88vh;overflow:auto;box-shadow:0 8px 40px #000a;min-width:520px}
#agv-board h3{color:var(--accent);font-size:16px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:20px}
#agv-board .abclose{cursor:pointer;color:var(--dim);font-size:20px;line-height:1}
#agv-board .absub{color:var(--dim);font-size:11px;margin-bottom:12px}
#agv-board table{border-collapse:collapse;width:100%;font-size:12px}
#agv-board th,#agv-board td{padding:5px 9px;text-align:right;border-bottom:1px solid var(--border)}
#agv-board th:first-child,#agv-board td:first-child{text-align:left}
#agv-board th{color:var(--dim);font-weight:600;font-size:11px}
#agv-board tr.tot td{font-weight:700;border-top:2px solid var(--accent);border-bottom:none}
#agv-board .ub{display:inline-block;vertical-align:middle;width:70px;height:9px;background:var(--card);border-radius:5px;overflow:hidden;margin-left:6px;border:1px solid var(--border)}
#agv-board .ub>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--accent))}
</style>
</head>
<body>
<div id="hdr">
  <img id="logo-hdr" alt="Ching Tech 擎添工業">
  <div id="hdr-main">
    <!-- 上：資訊列 -->
    <div id="hdr-info">
      <div id="ttl">欣興電子 AGV 模擬</div>
      <div id="clk">00:00:00</div>
      <div id="prog">
        <div id="pbl">完成 0 / 4000 片</div>
        <div id="pbw"><div id="pb"></div></div>
      </div>
    </div>
    <!-- 下：控制列 -->
    <div id="hdr-ctrl">
      <div class="cg">
        <button id="bplay" onclick="togglePlay()">▶ 播放</button>
        <div class="seg">
          <button id="b1x" class="act" onclick="setSpeed(1)">1×</button>
          <button id="b2x" onclick="setSpeed(2)">2×</button>
          <button id="b5x" onclick="setSpeed(5)">5×</button>
          <button id="b10x" onclick="setSpeed(10)">10×</button>
        </div>
        <button id="btn-fast" class="pri" onclick="fastForward()">⏩ 立即結果</button>
      </div>
      <div class="hdr-sep"></div>
      <div class="cg">
        <button class="rst" onclick="resetSim()">↺ 重置</button>
        <button class="rst" onclick="backToSelect()">⇄ 切換線</button>
      </div>
      <div class="hdr-sep"></div>
      <div class="cg">
        <button id="btn-view" onclick="toggleView()">▤ 精簡</button>
        <button onclick="toggleAgvBoard()">📊 看板</button>
        <button onclick="resetCamera()">⤢ 視角</button>
        <button onclick="toggleSB()">⚙ 參數</button>
      </div>
    </div>
  </div>
</div>
<div id="main">
 <div id="fw">
  <svg id="fsvg" viewBox="0 0 1400 870" preserveAspectRatio="xMidYMid meet">
    <text id="abf-hdr" x="10" y="22" class="llb">ABF 製程線</text>
    <text id="abf-hdr2" x="10" y="35" class="llb2">● 滿框(綠)  ○ 空框(橘)  ▶ 加工中(藍)  ◌ AGV預訂(淡綠)</text>
    <text id="smk-hdr" x="10" y="218" class="llb">SMK 製程線</text>
    <text id="smk-hdr2" x="10" y="229" class="llb2">Cycle: 35:50 ｜ 9 AGV ｜ 12 pcs/cycle</text>
    <g id="abf-tracks"></g><g id="smk-tracks"></g>
    <g id="abf-stations"></g><g id="smk-stations"></g>
    <g id="abf-agvs"></g><g id="smk-agvs"></g>
  </svg>
  <div id="bot-toggle" onclick="toggleBot()">
    <span class="arrow">▲</span>
    <span id="bot-toggle-lbl">統計圖表</span>
    <span id="bot-mini" style="margin-left:8px;color:var(--accent);font-size:11px;font-weight:600"></span>
  </div>
  <div id="bot">
    <div id="cw"><canvas id="uc"></canvas></div>
    <div id="sp">
      <div style="font-size:12px;font-weight:600;color:var(--accent)">即時統計</div>
      <div id="row-auph" class="sr"><span class="sl">ABF UPH</span><span class="sv abf" id="s-auph">—</span></div>
      <div id="row-suph" class="sr"><span class="sl">SMK UPH</span><span class="sv smk" id="s-suph">—</span></div>
      <div class="sr"><span class="sl">已完成</span><span class="sv grn" id="s-done">0 片</span></div>
      <div class="sr"><span class="sl">目標</span><span class="sv" id="s-tgt">4000 片</span></div>
      <div class="sr"><span class="sl">預估完成</span><span class="sv" id="s-eta">—</span></div>
      <div id="bnk-section"><hr style="border-color:var(--border)">
      <div style="font-size:11px;font-weight:600;color:var(--red)">瓶頸警示（PORT 堆積）</div>
      <div id="bnklist"><div class="nob">目前無瓶頸</div></div></div>
    </div>
  </div>
 </div>
 <div id="sb"><div id="sbi">
   <div id="sb-scroll"></div>
   <div id="sb-ft"></div>
 </div></div>
</div>
<div id="cmp-card"></div>
<div id="stn-tip"></div>
<div id="agv-board" onclick="if(event.target===this)toggleAgvBoard()">
  <div class="abx">
    <h3><span>📊 AGV 稼動看板</span><span class="abclose" onclick="toggleAgvBoard()">✕</span></h3>
    <div class="absub">動作 = 移動 + 取放　｜　稼動率 = 動作 ÷（動作 + 閒置）</div>
    <div id="agv-board-body"></div>
  </div>
</div>
<input id="import-file" type="file" accept=".json" style="display:none" onchange="importParams(event)">
<div id="ov"><h2 id="ovh">模擬完成</h2><p id="ovm"></p>
  <button onclick="document.getElementById('ov').classList.remove('show')" style="margin-top:12px">關閉</button>
</div>

<div id="sel-ov" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#eef2f8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:10px">
  <img id="logo-sel" alt="Ching Tech 擎添工業" style="height:120px;margin-bottom:10px">
  <div style="font-size:24px;font-weight:700;color:var(--accent)">欣興電子 AGV 模擬系統</div>
  <div style="color:var(--dim);font-size:14px;margin-bottom:24px">選擇要模擬的製程線</div>
  <div style="display:flex;gap:24px">
    <button onclick="selectLine('abf')" style="width:220px;height:110px;font-size:18px;font-weight:700;background:#eaf2fc;border:2px solid var(--abf);color:var(--abf);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 8px #0001">
      ABF 製程線
      <span style="font-size:11px;color:#5a6a85;font-weight:400">CLN → CZ → ABF壓機 → Postcure</span>
    </button>
    <button onclick="selectLine('smk')" style="width:220px;height:110px;font-size:18px;font-weight:700;background:#fdf0e6;border:2px solid var(--smk);color:var(--smk);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 8px #0001">
      SMK 製程線
      <span style="font-size:11px;color:#5a6a85;font-weight:400">CLN → CZ → 壓機 → 曝光 → 顯影 → UVQ → 換框機</span>
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// DEFAULTS & CONFIG
// ══════════════════════════════════════════════════════════════
const DEF = {
  clnTime:360, czTime:360, pressTime:360,
  abfBt:1,                            // ABF 每框片數
  tg:4000,                            // 目標產量（兩線共用）
  // AGV 取/放料時間（transfer/changer 站用）
  pickTime:0, dropTime:0,
  // 緩衝站（Annealing/Baking/Postcure）取/放料時間
  bufPickTime:0, bufDropTime:0,
  // ABF 各路段行走時間（秒）—— 每對站點獨立設定
  t01:250, t12:290, t02:540,   // CLN↔Annealing, Annealing↔CZ, CLN↔CZ
  t23:170, t34:200, t45:320, t24:370, // CZ↔Baking, Baking↔ABF壓機, ABF壓機↔Postcure, CZ↔ABF壓機
  t56:200, t46:520,                   // Postcure↔換框機, ABF壓機↔換框機
  changerTime:360,                    // 換框機 拿料時間（秒）
  // ── SMK 製程線參數（ABF 式 slot/PORT 引擎）──
  smkCln:360, smkCz:360, smkPress:360, smkExp:360, smkDev:360, smkUvq:360, smkChanger:360, // 各站處理時間
  smkBt:1,                            // SMK 每框片數
  smkPick:0, smkDrop:0, smkBufPick:0, smkBufDrop:0, // 取/放料時間
  // SMK 路段行走時間（10 段相鄰站，秒）—— 每段獨立設定
  smkR0:250, smkR1:290, smkR2:170, smkR3:200, smkR4:200,   // CLN↔Ann, Ann↔CZ, CZ↔Bak, Bak↔壓機, 壓機↔曝光
  smkR5:200, smkR6:250, smkR7:200, smkR8:200, smkR9:200,   // 曝光↔顯影, 顯影↔SoftBak, SoftBak↔UVQ, UVQ↔Post, Post↔換框
  // SMK 回程直達路段（空框跳過中間緩衝站，秒）
  smkD02:540, smkD24:370, smkD68:450, smkD810:400          // CZ↔CLN, 壓機↔CZ, UVQ↔顯影, 換框機↔UVQ
};
let P = {...DEF};

// ABF Station definitions
// xi = 主軌道位置(0-6)，sub = 同位置第幾台(0起)
// Indices: 0=CLN,1=Annealing,2=CZ_1,3=Baking,4=ABF壓機_1,5=Postcure,6=換框機
//          7=CZ_2, 8=ABF壓機_2, 9=ABF壓機_3, 10=ABF壓機_4
const ABF_DEFS = [
  {name:'CLN',       mtype:'refill',   xi:0, sub:0},
  {name:'Annealing', buf:16, holdTime:10, xi:1, sub:0},
  {name:'CZ_1',      mtype:'transfer', xi:2, sub:0},
  {name:'Baking',    buf:6,            xi:3, sub:0},
  {name:'ABF壓機_1', mtype:'transfer', xi:4, sub:0},
  {name:'Postcure',  buf:6,            xi:5, sub:0},
  {name:'換框機',    mtype:'changer',  xi:6, sub:0},
  {name:'CZ_2',      mtype:'transfer', xi:2, sub:1},

function routeABF(i,j){
  const xi = abfSt[i]?.xi ?? i;

  if(xi===xj) return 0;
  const a=Math.min(xi,xj), b=Math.max(xi,xj);
  const direct={
    '0_1':P.t01, '1_2':P.t12, '0_2':P.t02,
    '2_3':P.t23, '3_4':P.t34, '4_5':P.t45, '2_4':P.t24,
    '5_6':P.t56, '4_6':P.t46
  };
  const key=`${a}_${b}`;
  if(key in direct) return direct[key];
  const cum=[0,P.t01,P.t01+P.t12,P.t01+P.t12+P.t23,P.t01+P.t12+P.t23+P.t34,

  return Math.abs(cum[xi]-cum[xj]);
}

// 站別型態判斷（用於來源出滿框 / 來源收空框 / 目的入料 / 目的退空框）
function srcOutFull(s){ return s.mtype==='refill' ? (s.s_out && !s.s_out_res) : (s.out_full && !s.out_full_hold && !s.out_full_res); }
function srcRecvFree(s){ return s.mtype==='refill' ? (s.s_recv===0 && !s.s_recv_res) : (s.out_recv===0 && !s.out_recv_res); }
function dstInFree(s){ return s.in_full===0 && !s.in_full_res; }
function dstRetAvail(s){ return s.in_ret && !s.in_ret_hold && !s.in_ret_res; }
function midHasSpace(buf, mode){
  if(mode==='none') return true;
  if(mode==='avail') return buf.fullAvail < buf.buf;
  return buf.fullAvail + buf.pendingFrames.length < buf.buf; // 'pending'（預設）
}
function genGroupTasks(g){
  const s = abfSt; // 當前作用線狀態
  const T = [];
  if(g.mid!=null){
    const buf = s[g.mid];
    // A：各來源出滿框 → 緩衝（緩衝有空間）
    for(const si of g.src)
      if(srcOutFull(s[si]) && midHasSpace(buf, g.midSpace))
        T.push({f:si, t:g.mid, c:'full', pri:g.priA});
    // B：緩衝 → 任一空的目的入料
    for(const di of g.dst)
      if(buf.fullAvail > buf.fullReserved && dstInFree(s[di]))
        T.push({f:g.mid, t:di, c:'full', pri:g.priB});
    // C：各目的退空框 → 任一來源收空框（取第一個）
    for(const di of g.dst)
      if(dstRetAvail(s[di]))
        for(const si of g.src)
          if(srcRecvFree(s[si])){ T.push({f:di, t:si, c:'empty', pri:10}); break; }
  } else {
    // 2 站直送（無 buffer）：來源出滿框 → 任一空目的；目的退空框 → 來源收空框
    for(const si of g.src)
      if(srcOutFull(s[si]))
        for(const di of g.dst)
          if(dstInFree(s[di])){ T.push({f:si, t:di, c:'full', pri:g.priA}); break; }
    for(const di of g.dst)
      if(dstRetAvail(s[di]))
        for(const si of g.src)
          if(srcRecvFree(s[si])){ T.push({f:di, t:si, c:'empty', pri:10}); break; }
  }
  return T;
}

// Group 1 任務：CLN ↔ Annealing ↔ CZ（所有 CZ 機台）
function getGroup1Tasks(){
  const s = abfSt;
  const T = [];
  // CLN 出滿框 → Annealing
  if(s[0].s_out && !s[0].s_out_res && s[1].fullAvail+s[1].pendingFrames.length < s[1].buf)
    T.push({f:0,t:1,c:'full',pri:7});
  // Annealing → 任一空的 CZ 入滿框（目的地沒框且未預訂）
  for(const ci of CZ_INDICES)
    if(s[1].fullAvail > s[1].fullReserved && s[ci].in_full===0 && !s[ci].in_full_res)
      T.push({f:1,t:ci,c:'full',pri:9});
  // 每台 CZ 退空框 → CLN 收空框（CLN 收空框位沒框且未預訂）
  for(const ci of CZ_INDICES)
    if(s[ci].in_ret && !s[ci].in_ret_hold && !s[ci].in_ret_res && s[0].s_recv===0 && !s[0].s_recv_res)
      T.push({f:ci,t:0,c:'empty',pri:10});
  return T;
}

// Group 2 任務：CZ ↔ Baking ↔ ABF壓機（所有 CZ 和 ABF壓機 機台）
function getGroup2Tasks(){
  const s = abfSt;
  const T = [];
  // 每台 CZ 出滿框 → Baking
  for(const ci of CZ_INDICES)
    if(s[ci].out_full && !s[ci].out_full_hold && !s[ci].out_full_res && s[3].fullAvail < s[3].buf)
      T.push({f:ci,t:3,c:'full',pri:8});
  // Baking → 任一空的 ABF壓機 入滿框（目的地沒框且未預訂）
  for(const pi of PRESS_INDICES)
    if(s[3].fullAvail > s[3].fullReserved && s[pi].in_full===0 && !s[pi].in_full_res)
      T.push({f:3,t:pi,c:'full',pri:9});
  // 每台 ABF壓機 退空框 → 任一空的 CZ 出料收空框（目的地沒框且未預訂）
  for(const pi of PRESS_INDICES)
    if(s[pi].in_ret && !s[pi].in_ret_hold && !s[pi].in_ret_res)
      for(const ci of CZ_INDICES)
        if(s[ci].out_recv===0 && !s[ci].out_recv_res){ T.push({f:pi,t:ci,c:'empty',pri:10}); break; }
  return T;
}

// Group 3 任務：ABF壓機 ↔ Postcure ↔ 換框機（所有 ABF壓機 機台）
function getGroup3Tasks(){
  const s = abfSt;

  for(const pi of PRESS_INDICES)
    if(s[pi].out_full && !s[pi].out_full_hold && !s[pi].out_full_res)

  // Postcure → 任一空的 換框機 入滿框（目的地沒框且未預訂）
  for(const chi of CHANGER_INDICES)
    if(s[5].fullAvail > s[5].fullReserved && s[chi].in_full===0 && !s[chi].in_full_res)
      T.push({f:5,t:chi,c:'full',pri:8});
  // 每台換框機 退空框 → 任一空的 ABF壓機 出料收空框（目的地沒框且未預訂）

// 預訂目的地 slot：AGV 接受任務時同時鎖定目的地，防止兩台 AGV 同時投遞到同一個空 slot
function reserveDestination(destIdx, cargo){
  const s = abfSt[destIdx];
  if(!s) return;
  if(cargo==='full'){
    if(s.mtype==='transfer'||s.mtype==='changer') s.in_full_res=1;
  }
  if(cargo==='empty'){
    if(s.mtype==='refill') s.s_recv_res=1;
    if(s.mtype==='transfer') s.out_recv_res=1;
  }
}

// 預訂取貨：防止兩台 AGV 搶同一個框。
// transfer 站只設 reservation flag，不清除 slot（slot 要等 AGV 實際到站才清）
function tryPickupABF(si, cargo){
  const s = abfSt[si];
  if(cargo==='full'){
    if(s.mtype==='refill'   && s.s_out>0 && !s.s_out_res)                            { s.s_out_res=1;    return true; }
    if(s.mtype==='transfer' && s.out_full>0 && !s.out_full_hold && !s.out_full_res) { s.out_full_res=1;  return true; }
    if(s.buf && s.fullAvail > s.fullReserved)                                       { s.fullReserved++; return true; }
  }
  if(cargo==='empty'){
    if((s.mtype==='transfer'||s.mtype==='changer') && s.in_ret>0 && !s.in_ret_hold && !s.in_ret_res)
      { s.in_ret_res=1; return true; }
  }
  return false;
}

// AGV 實際到站後才清除 slot / 扣除數量（PORT 顯示在此刻改變）
function doActualPickup(si, cargo){
  const s = abfSt[si];
  if(cargo==='full'){
    if(s.mtype==='refill')   { s.s_out=0;      s.s_out_res=0;   }
    if(s.mtype==='transfer') { s.out_full=0;   s.out_full_res=0; }
    else if(s.buf)           { s.fullAvail--;   s.fullReserved--; }
  }
  if(cargo==='empty' && (s.mtype==='transfer'||s.mtype==='changer')) { s.in_ret=0; s.in_ret_res=0; }
}

// 站點幾何：依 layout 計算 x,y 與軌道錨點 tfy(前進)/tyr(回程)
function computeGeom(L){
  const lay=L.layout, out=new Array(L.defs.length);
  if(lay.type==='serpentine'){
    const GAP=(EX-SX)/(Math.max(...lay.rows.map(r=>r.length))-1);
    lay.rows.forEach((row,r)=>{
      const y=lay.rowY[r], tf=lay.rowTrack[r][0], tr=lay.rowTrack[r][1];
      const ltr=(r%2===0); // 偶列左→右、奇列右→左（蛇形）
      row.forEach((idx,k)=>{
        const x = ltr ? (SX + k*GAP) : (EX - k*GAP);
        out[idx]={x:Math.round(x), y, tfy:tf, tyr:tr};
      });
    });
  } else { // 'row'
    const gap=lay.gap || (EX-SX)/(lay.xiCount-1);
    L.defs.forEach((d,i)=>{
      const xi=d.xi!==undefined?d.xi:i, sub=d.sub!==undefined?d.sub:0;
      out[i]={x:Math.round(SX+xi*gap), y:ABF_SY+sub*SUB_SPACING, tfy:ABF_TY_FWD, tyr:ABF_TY_RET};
    });
  }
  return out;
}
function initSim(){
  LC = LINES[selectedLine] || LINES.abf; // 一般化接點：選定當前 line config
  simT=0; running=false; lastRT=null;
  abfOut=[]; abfPcs=0; lastChart=-999;
  cdata={labels:[],abf:[],smk:[]};

  // 作用線站點：幾何（x,y + 軌道錨點 tfy/tyr）由 layout 計算（row / serpentine）
  const _geom = computeGeom(LC);
  abfSt=LC.defs.map((d,i)=>{
    const xi  = d.xi  !== undefined ? d.xi  : i;
    const sub = d.sub !== undefined ? d.sub : 0;
    const g   = _geom[i];
    const base={name:d.name,x:g.x,y:g.y,tfy:g.tfy,tyr:g.tyr,xi,sub,mtype:d.mtype||null,buf:d.buf||0,sink:d.sink||false};
    const pt = LC.procTime(d); // 處理時間：依製程線 + 站別
    if(d.mtype==='refill'){
      // CLN: 3 slots + machine
      // Pre-load: 1 frame in processing, 1 frame ready at output
      return {...base,
        s_recv:1, s_recv_res:0, s_proc:1, s_out:1, s_out_res:0,
        processTime:pt, machineActive:true, machineTimer:pt
      };
    } else if(d.mtype==='transfer'){
      // CZ/壓機/曝光/顯影/UVQ: 6 slots (3 input + 3 output) + machine
      return {...base,
        // 入料端
        in_full:0, in_full_res:0, in_proc:0, in_ret:1, in_ret_hold:0, in_ret_res:0,
        // 出料端 — 預載：收空框位 + 放置位 各 1 個空框
        out_recv:1, out_recv_res:0, out_proc:1, out_full:0, out_full_hold:0, out_full_res:0,
        processTime:pt, machineActive:false, machineTimer:0
      };
    } else if(d.mtype==='changer'){
      return {...base,
        in_full:0, in_full_res:0, in_proc:0, in_ret:1, in_ret_hold:0, in_ret_res:0,
        in_full_wait:0, machineActive:false, machineTimer:0, processTime:pt
      };
    } else if(d.buf){
      return {...base, fullAvail:0, fullReserved:0, holdTime:d.holdTime||0,
              pendingFrames:[], countOnDelivery:!!d.countOnDelivery};
    } else {
      return base;
    }
  });
  // 各站每小時產出統計（桶索引 = floor(simT/3600)）
  abfSt.forEach(s=>{ s.prodHist=[]; });

  // ABF AGVs — 動態任務狀態（分組專用）
  abfAGVs = LC.agvInits.map(d=>({
    id:d.id, pos:d.pos, grp:d.grp,
    fromPos:d.pos, toPos:-1, destPos:-1,
    legPos:0, legTime:1,
    phase:'idle',
    cargo:null,
    stag:d.stag,
    pickWait:0, dropWait:0,
    // 稼動統計：移動 / 取放 / 閒置 / 啟動等待（秒）
    tMove:0, tHandle:0, tIdle:0, tStag:0
  }));

  buildSVG();

  // 作用線一律用 abf-* 群組渲染（ABF 式）；舊 smk-* 輸送帶群組隱藏
  const _abfEls=['abf-tracks','abf-stations','abf-agvs','abf-hdr','abf-hdr2'];
  const _smkEls=['smk-tracks','smk-stations','smk-agvs','smk-hdr','smk-hdr2'];
  _abfEls.forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  _smkEls.forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  // 表頭文字依作用線；viewBox 依 layout
  const _hdr=document.getElementById('abf-hdr'); if(_hdr) _hdr.textContent=LC.layout.header;
  const _svg=document.getElementById('fsvg');
  _svg.setAttribute('viewBox', viewMode==='simple' ? LC.layout.simple.viewBox : LC.layout.viewBox);
  syncCamera();

  if(chart){chart.data.labels=[];chart.data.datasets[0].data=[];chart.data.datasets[1].data=[];chart.update('none');}
  updateUI();
  document.getElementById('bplay').textContent='▶ 播放';
  document.getElementById('ov').classList.remove('show');
  document.getElementById('s-tgt').textContent=P.tg+' 片';
}

// ══════════════════════════════════════════════════════════════
// ABF MACHINE LOGIC (slot-based)
// ══════════════════════════════════════════════════════════════
const FEED_DELAY   = 5;  // 入料延遲：框到位 5s 後自動推入下一位
const OUT_FULL_HOLD = 5;  // 出滿框保護期（A3/A4 先來取）
const IN_RET_HOLD   = 15; // 退空框保護期（比出滿框長，確保兩者分開消失）

// 記錄某站一次產出（curBatch 片）至當前小時桶
function recordStnProd(s, units){
  const bk=Math.floor(simT/3600);
  s.prodHist[bk]=(s.prodHist[bk]||0)+(units!=null?units:curBatch());
}
function updateABFMachines(dt){
  for(const s of abfSt){
    if(!s.mtype) continue;

    if(s.mtype==='refill'){
      // Auto-feed: 收空框位 →(5s)→ 空框放置位 → 機器開始
      if(s.s_recv && !s.s_proc){
        s.recv_wait = (s.recv_wait||0) + dt;
        if(s.recv_wait >= FEED_DELAY){
          s.s_proc=1; s.s_recv=0; s.recv_wait=0;
          s.machineActive=true; s.machineTimer=s.processTime;
        }
      } else {
        s.recv_wait=0;
      }
      // Process（計時器到 0 後停住等 s_out 清空）
      if(s.machineActive){
        s.machineTimer = Math.max(0, s.machineTimer-dt);
        if(s.machineTimer===0 && !s.s_out){
          s.s_out=1; s.s_proc=0; s.machineActive=false;
          recordStnProd(s);
        }
      }

    } else if(s.mtype==='transfer'){ // 'transfer' (CZ, ABF壓機) —— 換框機(changer)由下方專屬迴圈處理，不可在此重複處理

      // 保護期倒數（讓 AGV 看到框後過 5s 才能取，確保畫面可見）
      if(s.in_ret_hold > 0)   s.in_ret_hold   = Math.max(0, s.in_ret_hold   - dt);
      if(s.out_full_hold > 0) s.out_full_hold = Math.max(0, s.out_full_hold - dt);

      // 入滿框 → 拿料位（拿料位空才移入，5s 延遲）
      if(s.in_full && !s.in_proc){
        s.in_full_wait = (s.in_full_wait||0) + dt;
        if(s.in_full_wait >= FEED_DELAY){ s.in_proc=1; s.in_full=0; s.in_full_wait=0; }
      } else { s.in_full_wait=0; }

      // 收空框 → 放置位（放置位空才移入，5s 延遲）
      if(s.out_recv && !s.out_proc){
        s.out_recv_wait = (s.out_recv_wait||0) + dt;
        if(s.out_recv_wait >= FEED_DELAY){ s.out_proc=1; s.out_recv=0; s.out_recv_wait=0; }
      } else { s.out_recv_wait=0; }

      // 拿料位 + 放置位 都有框，且退空框和出滿框都空 → 才啟動機器
      if(!s.machineActive && s.in_proc && s.out_proc && !s.in_ret && !s.out_full){
        s.machineActive=true; s.machineTimer=s.processTime;
      }

      // 計時結束：退空框空且出滿框空，才把框移過去（否則繼續等）
      if(s.machineActive){
        s.machineTimer = Math.max(0, s.machineTimer-dt);
        if(s.machineTimer===0 && !s.in_ret && !s.out_full){
          s.machineActive=false;
          s.in_proc=0;  s.in_ret=1;   s.in_ret_hold=IN_RET_HOLD;
          s.out_proc=0; s.out_full=1; s.out_full_hold=OUT_FULL_HOLD;
          recordStnProd(s);
        }
      }
    }
  }
  // 換框機邏輯（入料端：入滿框→拿料位→退空框）
  for(const s of abfSt){
    if(s.mtype!=='changer') continue;
    if(s.in_ret_hold>0) s.in_ret_hold=Math.max(0,s.in_ret_hold-dt);
    // 入滿框 → 拿料位（5s 延遲）
    if(s.in_full && !s.in_proc){
      s.in_full_wait=(s.in_full_wait||0)+dt;
      if(s.in_full_wait>=FEED_DELAY){ s.in_proc=1; s.in_full=0; s.in_full_wait=0; }
    } else { s.in_full_wait=0; }
    // 拿料位有框且退空框空 → 才啟動拿料計時（退空框有框時不能啟動，等AGV取走後再開始）
    if(!s.machineActive && s.in_proc && !s.in_ret){ s.machineActive=true; s.machineTimer=s.processTime; }
    // 拿料完成
    if(s.machineActive){
      const prevTimer=s.machineTimer;
      s.machineTimer=Math.max(0,s.machineTimer-dt);
      // timer 首次歸零 → 立刻計產（不等退空框有沒有空間）
      if(prevTimer>0 && s.machineTimer===0){
        abfOut.push(simT); abfPcs+=curBatch(); recordStnProd(s); checkDone();
      }
      // 退空框空了才把框移過去
      if(s.machineTimer===0 && !s.in_ret){
        s.machineActive=false; s.in_proc=0; s.in_ret=1; s.in_ret_hold=IN_RET_HOLD;
      }
    }
  }
  // Buffer hold 計時：框放入緩衝區後等待 holdTime 秒才能被取走
  for(const s of abfSt){
    if(!s.buf || !s.pendingFrames.length) continue;
    for(let k=0;k<s.pendingFrames.length;k++) s.pendingFrames[k]-=dt;
    const ready=s.pendingFrames.filter(t=>t<=0).length;
    s.fullAvail+=ready;
    if(ready>0) recordStnProd(s, ready*curBatch());
    s.pendingFrames=s.pendingFrames.filter(t=>t>0);
  }
  // 瓶頸偵測：累計各站「出口滿框 / 退空框 / 緩衝滿載」滯留時間（PORT 堆積式）
  for(const s of abfSt){ if(stPiled(s)) s.pileT=(s.pileT||0)+dt; else s.pileT=0; }
}
// 某站是否有料堆積在出口（下游或回收 AGV 沒及時取走）
function stPiled(s){
  if(s.buf)               return s.fullAvail >= s.buf;        // 緩衝滿載
  if(s.mtype==='refill')  return !!s.s_out;                   // 出滿框未取
  if(s.mtype==='transfer')return !!s.out_full || !!s.in_ret;  // 出滿框/退空框未取
  if(s.mtype==='changer') return !!s.in_ret;                  // 退空框未取
  return false;
}
const BNK_TH=150; // 瓶頸判定門檻（秒）
function refreshBottleneck(){
  const bl=document.getElementById('bnklist'); if(!bl) return;
  const piles=abfSt.filter(s=>(s.pileT||0)>BNK_TH).sort((a,b)=>(b.pileT||0)-(a.pileT||0));
  if(!piles.length){ bl.innerHTML='<div class="nob">目前無瓶頸</div>'; return; }
  bl.innerHTML=piles.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">`
    +`<span class="bb">堆積</span><span style="font-size:11px;margin:0 4px;flex:1">${s.name}</span>`
    +`<span style="color:var(--red);font-size:12px;font-weight:bold">${Math.round(s.pileT)}s</span></div>`).join('');
}

// ══════════════════════════════════════════════════════════════
// ABF DROPOFF（放貨）
// ══════════════════════════════════════════════════════════════
function doDropoffABF(si, cargo){
  const s=abfSt[si];
  if(cargo==='full'){
    if(s.mtype==='transfer'||s.mtype==='changer'){ s.in_full=1; s.in_full_res=0; return; }
    if(s.buf){
      if(s.countOnDelivery){ abfOut.push(simT); abfPcs+=curBatch(); checkDone(); }
      if(s.holdTime>0) s.pendingFrames.push(s.holdTime); else { s.fullAvail++; recordStnProd(s); }
      return;
    }
  }
  if(cargo==='empty'){
    if(s.mtype==='refill'){ s.s_recv=1; s.s_recv_res=0; return; }
    if(s.mtype==='transfer'){ s.out_recv=1; s.out_recv_res=0; return; }
  }
}

// ══════════════════════════════════════════════════════════════
// ABF AGV STEP — 動態任務分配
// ══════════════════════════════════════════════════════════════
function startDelivery(agv){
  agv.fromPos=agv.pos; agv.toPos=agv.destPos;
  agv.legPos=0; agv.legTime=Math.max(1,tABF(agv.pos,agv.destPos));
  agv.phase='delivering';
}

function stepABFAgv(agv, dt){
  // 稼動統計累計（依進入此步前的狀態分類）
  if(agv.stag>0) agv.tStag+=dt;
  else if(agv.phase==='picking'||agv.phase==='dropping') agv.tHandle+=dt;
  else if(agv.phase==='idle') agv.tIdle+=dt;
  else agv.tMove+=dt; // toPickup / delivering
  if(agv.stag>0){ agv.stag-=dt; return; }

  // 取料等待（AGV 已到站，等取料時間）
  if(agv.phase==='picking'){
    agv.pickWait-=dt;
    if(agv.pickWait<=0) startDelivery(agv);
    return;
  }

  // 放料等待（AGV 已到站，等放料時間）
  if(agv.phase==='dropping'){
    agv.dropWait-=dt;
    if(agv.dropWait<=0){ doDropoffABF(agv.pos,agv.cargo); agv.cargo=null; agv.phase='idle'; }
    return;
  }

  if(agv.phase==='idle'){
    const tasks = genGroupTasks(LC.groups[agv.grp-1]);
    tasks.sort((a,b)=>{
      const da=tABF(agv.pos,a.f), db=tABF(agv.pos,b.f);
      // 1. 就在取貨站（距離=0）優先 → 一放一取，不多跑
      if((da===0)!==(db===0)) return da===0?-1:1;
      // 2. 再看任務優先度
      if(b.pri!==a.pri) return b.pri-a.pri;
      // 3. 最後取距離最近
      return da-db;
    });
    for(const task of tasks){
      // 如果同組有更近的閒置 AGV，讓它去取，自己跳過
      const myDist = tABF(agv.pos, task.f);
      const closerExists = abfAGVs.some(o =>
        o !== agv && o.grp === agv.grp && o.phase === 'idle' && o.stag <= 0 &&
        tABF(o.pos, task.f) < myDist
      );
      if(closerExists) continue;
      if(tryPickupABF(task.f, task.c)){
        agv.cargo=task.c; agv.destPos=task.t;
        reserveDestination(task.t, task.c);
        if(agv.pos===task.f){
          doActualPickup(task.f,task.c);
          const _pt=getPickTime(task.f);
          if(_pt>0){ agv.pickWait=_pt; agv.phase='picking'; }
          else startDelivery(agv);
        } else {
          agv.fromPos=agv.pos; agv.toPos=task.f;
          agv.legPos=0; agv.legTime=Math.max(1,tABF(agv.pos,task.f));
          agv.phase='toPickup';
        }
        break;
      }
    }
    return;
  }

  agv.legPos += dt / agv.legTime;
  if(agv.legPos >= 1){
    agv.legPos=1; agv.pos=agv.toPos;
    if(agv.phase==='toPickup'){
      doActualPickup(agv.pos,agv.cargo);
      const _pt=getPickTime(agv.pos);
      if(_pt>0){ agv.pickWait=_pt; agv.phase='picking'; }
      else startDelivery(agv);
    } else { // delivering
      const _dt=getDropTime(agv.pos);
      if(_dt>0){ agv.dropWait=_dt; agv.phase='dropping'; }
      else { doDropoffABF(agv.pos,agv.cargo); agv.cargo=null; agv.phase='idle'; }
    }
  }
}

function checkDone(){
  const tot=abfPcs; // 作用線產出一律累計於 abfPcs
  if(tot>=P.tg){
    running=false;
    document.getElementById('bplay').textContent='▶ 播放';
    document.getElementById('ovm').textContent=`已完成 ${tot} 片，模擬時間 ${fmt(simT)}`;
    document.getElementById('ov').classList.add('show');
  }
}

// ══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ══════════════════════════════════════════════════════════════
function tick(rt){
  if(!running)return;
  if(lastRT===null)lastRT=rt;
  const sd=(rt-lastRT)/1000*SIM_MULT*spd; lastRT=rt;
  simT+=sd;
  // 作用線（ABF 或 SMK）一律走一般化引擎
  updateABFMachines(sd); for(const a of abfAGVs)stepABFAgv(a,sd);
  if(simT-lastChart>=60){lastChart=simT;updateChart();}
  updateUI();
  rafId=requestAnimationFrame(tick);
}
function togglePlay(){
  running=!running;
  document.getElementById('bplay').textContent=running?'⏸ 暫停':'▶ 播放';
  if(running){lastRT=null;rafId=requestAnimationFrame(tick);}
  else if(rafId)cancelAnimationFrame(rafId);
}
function setSpeed(s){
  spd=s;[1,2,5,10].forEach(v=>document.getElementById(`b${v}x`).classList.toggle('act',v===s));
}
// 立即結果：不播放動畫，分塊全速跑物理直到達標或上限，再顯示結果
let fastRun=false;
function fastForward(){
  if(fastRun) return;
  if(running) togglePlay();              // 停掉動畫播放
  fastRun=true;
  const dt=1, CHUNK=80000;
  const MAX_SIMT=simT + 5000*3600;       // 上限：再模擬 5000 小時（安全網，多數目標會提早達成）
  const btn=document.getElementById('btn-fast');
  if(btn){ btn.disabled=true; }
  function step(){
    let n=0;
    while(n<CHUNK && abfPcs<P.tg && simT<MAX_SIMT){
      updateABFMachines(dt); for(const a of abfAGVs) stepABFAgv(a,dt); simT+=dt; n++;
    }
    if(abfPcs>=P.tg || simT>=MAX_SIMT){
      fastRun=false;
      if(btn){ btn.disabled=false; btn.textContent='⏩ 立即結果'; }
      lastChart=-999; cdata={labels:[],abf:[],smk:[]};
      if(chart){chart.data.labels=[];chart.data.datasets[0].data=[];chart.data.datasets[1].data=[];chart.update('none');}
      updateUI();
      showFastResult();
    } else {
      if(btn) btn.textContent=`⏳ ${Math.min(99,Math.round(abfPcs/P.tg*100))}%`;
      requestAnimationFrame(step);
    }
  }
  requestAnimationFrame(step);
}
function showFastResult(){
  const done=abfPcs, reached=done>=P.tg;
  const avg = simT>0 ? Math.round(done/(simT/3600)) : 0; // 平均產能 = 總片數 / 總時數
  const recentUph=calcUPH(abfOut,simT,curBatch());
  const ovh=document.getElementById('ovh'), ovm=document.getElementById('ovm');
  let msg;
  if(reached){
    if(ovh) ovh.textContent='✅ 達成目標';
    msg=`完成 ${P.tg} 片<br>模擬時間 <b>${fmt(simT)}</b><br>平均產能 <b>${avg}</b> 片/hr`;
  } else {
    if(ovh) ovh.textContent='⏱ 計算結果（達上限）';
    let eta='—'; if(recentUph>0) eta=fmt(simT + (P.tg-done)/recentUph*3600);
    msg=`已模擬 ${fmt(simT)}<br>完成 ${done} / ${P.tg} 片<br>目前 UPH ${recentUph} 片/hr<br>預估達標時間 <b>${eta}</b>`;
  }
  if(ovm) ovm.innerHTML=msg;
  document.getElementById('ov').classList.add('show');
}
function resetSim(){running=false;if(rafId)cancelAnimationFrame(rafId);liveMarks=[];renderLiveMarks();initSim();}
function toggleBot(){
  const bot=document.getElementById('bot');
  const tog=document.getElementById('bot-toggle');
  const collapsed=bot.classList.toggle('collapsed');
  tog.classList.toggle('collapsed',collapsed);
  if(chart) setTimeout(()=>chart.resize(),260);
}

// SVG BUILD
// ══════════════════════════════════════════════════════════════
const NS='http://www.w3.org/2000/svg';
function ns(t){return document.createElementNS(NS,t);}

function buildSVG(){
  if(viewMode==='simple'){ buildSimpleSVG(); return; }
  // 一般化：作用線（ABF 或 SMK）都用 ABF 式渲染器（abfSt/abfAGVs 為當前作用線狀態）
  buildABFSVG();
  buildABFAgvSVG();
}

// ══════════════════════════════════════════════════════════════
// 精簡視圖（每製程位置一個大方塊，多機台合併；字大、適合 demo 全覽）
// ══════════════════════════════════════════════════════════════
// 依 layout.simple 計算各 xi 欄位的位置與軌道錨點，多機台(同 xi)合併為一欄
function xiColumns(){
  const lay=LC.layout.simple;
  const byXi={}; abfSt.forEach((s,i)=>{(byXi[s.xi]=byXi[s.xi]||[]).push(i);});
  const cols=Object.keys(byXi).map(Number).sort((a,b)=>a-b).map(xi=>({xi,members:byXi[xi],rep:byXi[xi][0]}));
  const GAP=(EX-SX)/(Math.max(...lay.rows.map(r=>r.length))-1);
  lay.rows.forEach((row,r)=>{
    const ltr=(r%2===0);
    row.forEach((xi,k)=>{
      const col=cols.find(c=>c.xi===xi); if(!col)return;

// 欄位聚合狀態（多機台合併）
function colStatus(col){
  const ms=col.members.map(i=>abfSt[i]);
  const s0=ms[0];
  if(s0.mtype==='refill'){
    if(s0.machineActive&&s0.machineTimer>0) return {t:`⏱ ${Math.ceil(s0.machineTimer)}s`,c:'#1565c0'};
    if(s0.s_out) return {t:'出料就緒',c:'#00922f'};
    return {t:'idle',c:'#5a6a85'};
  }
  if(s0.buf){
    const tot=ms.reduce((a,s)=>a+s.fullAvail+(s.pendingFrames?s.pendingFrames.length:0),0);
    const cap=ms.reduce((a,s)=>a+s.buf,0);
    return {t:`${tot}/${cap} 框`,c:tot>=cap?'#cc1111':tot>0?'#b8860b':'#5a6a85'};
  }
  // transfer / changer：忙碌台數
  const busy=ms.filter(s=>s.machineActive).length;
  return {t:`加工 ${busy}/${ms.length}`,c:busy>0?'#1565c0':'#5a6a85'};
}

function updateSimpleAgvPos(a){
  const g=document.getElementById(`agv-${a.id}`),c=document.getElementById(`ac-${a.id}`);
  if(!g||!c)return;
  let x,ty;
  const curCol=colOfXi(abfSt[a.pos]?.xi);
  if(a.phase==='idle'||a.phase==='picking'||a.phase==='dropping'||a.toPos<0){
    x=curCol?curCol.x:0; ty=curCol?curCol.y-46:0;
  } else {
    const fc=colOfXi(abfSt[a.fromPos]?.xi), tc=colOfXi(abfSt[a.toPos]?.xi);
    const sx=fc?fc.x:0,dx=tc?tc.x:0;
    const fwd=a.toPos>a.fromPos;
    const sy=fwd?(fc?fc.tfy:0):(fc?fc.tyr:0), dy=fwd?(tc?tc.tfy:0):(tc?tc.tyr:0);
    x=sx+(dx-sx)*a.legPos; ty=sy+(dy-sy)*a.legPos;
  }
  g.setAttribute('transform',`translate(${Math.round(x)},${Math.round(ty)})`);
  // 車身飽和色 + 載貨標記（與詳細模式一致）
  const carrying=(a.phase==='delivering'||a.phase==='dropping');
  const ring=document.getElementById(`aring-${a.id}`);
  agvBody(a, c, ring, carrying);
  const cd=document.getElementById(`acd-${a.id}`);
  if(cd){
    if(carrying && a.cargo==='full'){cd.setAttribute('fill','#00c853');cd.setAttribute('stroke','#0a6b2e');cd.setAttribute('stroke-width','1.5');}
    else if(carrying && a.cargo==='empty'){cd.setAttribute('fill','#ff9800');cd.setAttribute('stroke','#b35e00');cd.setAttribute('stroke-width','1.5');}
    else {cd.setAttribute('fill','none');cd.setAttribute('stroke','none');}
  }
}

// FLOWCHART CAMERA (zoom / pan via viewBox)
// ══════════════════════════════════════════════════════════════
let camera=null, cameraBase=null, dragging=false, dragMoved=false, _drag=null;
function parseVB(str){ const p=str.trim().split(/\s+/).map(Number); return {x:p[0],y:p[1],w:p[2],h:p[3]}; }
// 由目前 fsvg 的 viewBox 設定基準與當前攝影機（於 initSim / setViewMode 設好 viewBox 後呼叫）
function syncCamera(){
  const svg=document.getElementById('fsvg'); if(!svg) return;
  const vb=svg.getAttribute('viewBox'); if(!vb) return;
  cameraBase=parseVB(vb); camera={...cameraBase};
}
function applyCamera(){
  const svg=document.getElementById('fsvg'); if(!svg||!camera) return;
  svg.setAttribute('viewBox',`${camera.x} ${camera.y} ${camera.w} ${camera.h}`);
}
function resetCamera(){ if(!cameraBase) return; camera={...cameraBase}; applyCamera(); }
function svgPoint(e){
  const svg=document.getElementById('fsvg');
  const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
  const m=svg.getScreenCTM(); if(!m) return {x:0,y:0};
  return pt.matrixTransform(m.inverse());
}
function onCamWheel(e){
  if(!camera) return;
  e.preventDefault();
  const f = e.deltaY<0 ? 0.9 : 1.1;           // 向上=放大（縮小 viewBox）
  const p=svgPoint(e);
  let nw=camera.w*f, nh=camera.h*f;
  const minW=cameraBase.w/6, maxW=cameraBase.w/0.3; // 縮放限制 0.3x ~ 6x
  if(nw<minW){ const k=minW/nw; nw*=k; nh*=k; }
  if(nw>maxW){ const k=maxW/nw; nw*=k; nh*=k; }
  const fx=(p.x-camera.x)/camera.w, fy=(p.y-camera.y)/camera.h;
  camera.x=p.x-fx*nw; camera.y=p.y-fy*nh; camera.w=nw; camera.h=nh;
  applyCamera();
}
function onCamDown(e){
  if(e.button!==0||!camera) return;
  dragging=true; dragMoved=false;
  _drag={sx:e.clientX, sy:e.clientY, cx:camera.x, cy:camera.y};
  hideStnTip();
}
function onCamMove(e){
  if(!dragging) return;
  const dx=e.clientX-_drag.sx, dy=e.clientY-_drag.sy;
  if(Math.abs(dx)+Math.abs(dy)>3) dragMoved=true;
  const svg=document.getElementById('fsvg');
  const sx=camera.w/(svg.clientWidth||1), sy=camera.h/(svg.clientHeight||1);
  camera.x=_drag.cx-dx*sx; camera.y=_drag.cy-dy*sy;
  applyCamera();
}
function onCamUp(){ dragging=false; }
function setupCameraControls(){
  const svg=document.getElementById('fsvg'); if(!svg) return;
  svg.addEventListener('wheel', onCamWheel, {passive:false});
  svg.addEventListener('mousedown', onCamDown);
  window.addEventListener('mousemove', onCamMove);
  window.addEventListener('mouseup', onCamUp);
}

// 站別平均 UPH（總產出 ÷ 已涵蓋小時，當前未滿小時按比例計）
function stnAvgUPH(i){
  const s=abfSt[i]; if(!s||!s.prodHist) return 0;
  const total=s.prodHist.reduce((a,b)=>a+(b||0),0);
  if(total===0) return 0;
  const curH=Math.floor(simT/3600);
  const hoursCovered=curH+Math.min(1,(simT%3600)/3600);
  return hoursCovered>0?Math.round(total/hoursCovered):0;
}
function stnTipHTML(i){
  const s=abfSt[i]; if(!s) return '';
  const hist=s.prodHist||[];
  const curH=Math.floor(simT/3600);
  const maxH=Math.max(curH, hist.length-1);
  let rows='', anyData=false;
  for(let h=0;h<=maxH;h++){
    const v=hist[h]||0; if(v>0) anyData=true;
    if(h>curH && v===0) continue;
    const isNow=(h===curH);
    rows+=`<div class="tt-r${isNow?' tt-now':''}"><span>${h}~${h+1}hr</span>`
        +`<span>${v}${isNow?' <span class="tt-dim">← 現在</span>':''}</span></div>`;
  }
  if(!anyData){ return `<div class="tt-h">${s.name}</div><div class="tt-dim">尚無產出</div>`; }
  return `<div class="tt-h">${s.name}</div>${rows}`
        +`<div class="tt-r tt-avg"><span>平均</span><span>${stnAvgUPH(i)} /hr</span></div>`;
}
// 站別平均 UPH 常駐標籤（置中，放在站名下方）
function addStnUphLabel(g, i, x, y, size){
  const u=ns('text');
  u.setAttribute('x',x); u.setAttribute('y',y);
  u.setAttribute('id',`abf-uph-${i}`);
  u.setAttribute('style',`fill:#00922f;font-size:${size}px;font-weight:bold;text-anchor:middle`);
  u.textContent='—'; g.appendChild(u);
}
function showStnTip(i,e){
  if(dragging) return;
  const t=document.getElementById('stn-tip'); if(!t) return;
  t.innerHTML=stnTipHTML(i); t.dataset.stn=i; t.style.display='block';
  moveStnTip(e);
}
function moveStnTip(e){
  const t=document.getElementById('stn-tip'); if(!t||t.style.display==='none') return;
  if(t.dataset.stn!=null) t.innerHTML=stnTipHTML(+t.dataset.stn); // 內容隨模擬即時更新
  let x=e.clientX+14, y=e.clientY+14;
  const w=t.offsetWidth, h=t.offsetHeight;
  if(x+w>innerWidth-8) x=e.clientX-w-14;
  if(y+h>innerHeight-8) y=innerHeight-h-8;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideStnTip(){ const t=document.getElementById('stn-tip'); if(t) t.style.display='none'; }

let agvBoardOpen=false;
function toggleAgvBoard(){
  agvBoardOpen=!agvBoardOpen;
  const el=document.getElementById('agv-board');
  if(el) el.classList.toggle('show',agvBoardOpen);
  if(agvBoardOpen) renderAgvBoard();
}
function renderAgvBoard(){
  const body=document.getElementById('agv-board-body'); if(!body) return;
  let sumM=0,sumH=0,sumI=0;
  const rows=abfAGVs.map(a=>{
    const mv=a.tMove||0, hd=a.tHandle||0, id=a.tIdle||0;
    const act=mv+hd, denom=act+id;
    const util=denom>0?act/denom:0;
    sumM+=mv; sumH+=hd; sumI+=id;
    const pct=Math.round(util*100);
    return `<tr><td>${a.id}</td><td>${fmt(mv)}</td><td>${fmt(hd)}</td><td>${fmt(id)}</td>`
      +`<td>${pct}%<span class="ub"><i style="width:${pct}%"></i></span></td></tr>`;
  }).join('');
  const tAct=sumM+sumH, tDen=tAct+sumI;
  const avgUtil=tDen>0?Math.round(tAct/tDen*100):0;
  const totRow=`<tr class="tot"><td>總計</td><td>${fmt(sumM)}</td><td>${fmt(sumH)}</td><td>${fmt(sumI)}</td>`
      +`<td>${avgUtil}%<span class="ub"><i style="width:${avgUtil}%"></i></span></td></tr>`;
  body.innerHTML=`<table><thead><tr><th>車</th><th>移動</th><th>取放</th><th>閒置</th><th>稼動率</th></tr></thead>`
      +`<tbody>${rows}${totRow}</tbody></table>`;
}

// Slot color definitions
const SLOT_COLORS={
  full:        {fill:'#d6f5e0',stroke:'#00a040',sym:'●',sc:'#00922f'}, // 滿框 (綠)
  reserved:    {fill:'#e8f7ee',stroke:'#5cb87f',sym:'◌',sc:'#3a9c5f'}, // 已預訂 (淡綠)
  empty_frame: {fill:'#ffe3c2',stroke:'#e07a00',sym:'○',sc:'#cc6600'}, // 空框 (橘)
  processing:  {fill:'#d6e8ff',stroke:'#1976d2',sym:'▶',sc:'#1565c0'}, // 加工中 (藍)
  none:        {fill:'#eef2f8',stroke:'#c5d0e0',sym:'',sc:'#c5d0e0'},   // 空位
};

function applySlotColor(id, state){
  const r=document.getElementById(id);
  const v=document.getElementById(id+'-v');
  if(!r) return;
  const c=SLOT_COLORS[state]||SLOT_COLORS.none;
  r.setAttribute('fill',c.fill);
  r.setAttribute('stroke',c.stroke);
  r.setAttribute('stroke-width', state==='none'?'1.5':'2');
  if(v){
    v.textContent=c.sym||'';
    v.setAttribute('style',`font-size:13px;font-weight:bold;fill:${c.sc}`);
  }
}

function updateUI(){
  document.getElementById('clk').textContent=fmt(simT);

  if(viewMode==='simple'){
    updateSimpleUI();
    const _u=calcUPH(abfOut,simT,curBatch());
    updateProgressAndStats(abfPcs, selectedLine==='abf'?_u:null, selectedLine==='smk'?_u:null);
    refreshBottleneck();
    if(agvBoardOpen) renderAgvBoard();
    return;
  }

  // ABF stations
  // 作用線（ABF 或 SMK）一律走 ABF 式站別/AGV 渲染
  for(let i=0;i<abfSt.length;i++){
    const s=abfSt[i];
    if(s.mtype==='refill'){
      const mt=document.getElementById(`abf-timer-${i}`);
      if(mt){
        if(s.machineActive && s.machineTimer>0) mt.textContent=`⏱ ${Math.ceil(s.machineTimer)}s`;
        else if(s.machineActive) mt.textContent='⌛ 等待出料';
        else if(s.recv_wait>0) mt.textContent=`⌛ 入框 ${Math.ceil(FEED_DELAY-s.recv_wait)}s`;
        else mt.textContent='⏱ idle';
      }
      applySlotColor(`abf-slot-${i}-recv`, s.s_recv?'empty_frame':'none');
      applySlotColor(`abf-slot-${i}-proc`,
        s.machineActive?'processing': s.s_proc?'empty_frame':'none');
      // 出滿框：有框=綠，已預訂（AGV在路上）=淡綠，空=空
      applySlotColor(`abf-slot-${i}-out`, s.s_out ? (s.s_out_res?'reserved':'full') : 'none');
    } else if(s.mtype==='transfer'){
      const mt=document.getElementById(`abf-timer-${i}`);
      if(mt){
        if(s.machineActive && s.machineTimer>0) mt.textContent=`⏱ ${Math.ceil(s.machineTimer)}s`;
        else if(s.in_full_wait>0)   mt.textContent=`⌛ 入料 ${Math.ceil(FEED_DELAY-s.in_full_wait)}s`;
        else if(s.out_recv_wait>0)  mt.textContent=`⌛ 收框 ${Math.ceil(FEED_DELAY-s.out_recv_wait)}s`;
        else mt.textContent='⏱ idle';
      }
      // 入料端
      applySlotColor(`abf-slot-${i}-in_full`, s.in_full?'full':'none');
      // 拿料位：機器中=藍，有料等加工=綠，空=空
      applySlotColor(`abf-slot-${i}-in_proc`,  s.machineActive?'processing': s.in_proc?'full':'none');
      // 退空框：機器完成後出現橘色，AGV 取走後消失
      applySlotColor(`abf-slot-${i}-in_ret`,   s.in_ret?'empty_frame':'none');
      // 出料端
      applySlotColor(`abf-slot-${i}-out_recv`, s.out_recv?'empty_frame':'none');
      // 放置位：機器中=藍，有空框等加工=橘，空=空
      applySlotColor(`abf-slot-${i}-out_proc`, s.machineActive?'processing': s.out_proc?'empty_frame':'none');
      // 出滿框：機器完成後出現綠色，AGV 取走後消失
      applySlotColor(`abf-slot-${i}-out_full`, s.out_full?'full':'none');
    } else if(s.mtype==='changer'){
      const mt=document.getElementById(`abf-timer-${i}`);
      if(mt){
        if(s.machineActive && s.machineTimer>0) mt.textContent=`⏱ ${Math.ceil(s.machineTimer)}s`;
        else if(s.in_full_wait>0) mt.textContent=`⌛ 入料 ${Math.ceil(FEED_DELAY-s.in_full_wait)}s`;
        else mt.textContent='⏱ idle';
      }
      applySlotColor(`abf-slot-${i}-in_full`, s.in_full?'full':'none');
      applySlotColor(`abf-slot-${i}-in_proc`, s.machineActive?'processing': s.in_proc?'full':'none');
      applySlotColor(`abf-slot-${i}-in_ret`,  s.in_ret?'empty_frame':'none');
    } else if(s.buf){
      const wt=document.getElementById(`abf-buf-${i}`);
      const bar=document.getElementById(`abf-bar-${i}`);
      const pending = s.pendingFrames ? s.pendingFrames.length : 0;
      const total = s.fullAvail + pending;
      if(wt){
        if(pending > 0){
          const minLeft = Math.ceil(Math.min(...s.pendingFrames));
          wt.textContent = `${s.fullAvail}/${s.buf}  (+${pending} ⌛${minLeft}s)`;
          wt.setAttribute('style','fill:#cc6600;font-size:11px;font-weight:bold');
        } else {
          wt.textContent = `${total}/${s.buf}`;
          wt.setAttribute('style','fill:#b8860b;font-size:14px;font-weight:bold');
        }
      }
      if(bar) bar.setAttribute('width',Math.round(88*Math.min(total/s.buf,1)));
    }
  }

  // 站別平均 UPH 常駐標籤
  for(let i=0;i<abfSt.length;i++){
    const ue=document.getElementById(`abf-uph-${i}`);
    if(ue){ const u=stnAvgUPH(i); ue.textContent = u>0 ? `${u} 片/hr` : '—'; }
  }

  // AGVs（作用線）
  for(const a of abfAGVs) updateABFAgvPos(a);
  const _uph=calcUPH(abfOut,simT,curBatch());
  updateProgressAndStats(abfPcs, selectedLine==='abf'?_uph:null, selectedLine==='smk'?_uph:null);
  refreshBottleneck();
  if(agvBoardOpen) renderAgvBoard();
}

function updateProgressAndStats(tot, au, su){
  const pct=Math.min(100,tot/P.tg*100);
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pbl').textContent=`完成 ${tot} / ${P.tg} 片`;
  if(au!=null) document.getElementById('s-auph').textContent=au>0?`${au} 片/hr`:'—';
  if(su!=null) document.getElementById('s-suph').textContent=su>0?`${su} 片/hr`:'—';
  document.getElementById('s-done').textContent=tot+' 片';
  const uph=(au||0)+(su||0);
  let etaTxt='—';
  if(uph>0&&tot<P.tg){ etaTxt=fmt(simT+(P.tg-tot)/uph*3600); }
  document.getElementById('s-eta').textContent=etaTxt;
  // mini stats in toggle bar when bot is collapsed
  const mini=document.getElementById('bot-mini');
  if(mini){
    const uphDisp=uph>0?`${uph} 片/hr`:'—';
    mini.textContent=document.getElementById('bot').classList.contains('collapsed')
      ? `完成 ${tot} 片　UPH ${uphDisp}　預估完成 ${etaTxt}` : '';
  }
  if(cmpState) renderCompareCard(); // 對比卡隨模擬即時更新差值
}

// AGV 車身上色（飽和色直接表示載貨，與 slot 圖例一致：滿框綠/空框橘）；詳細/精簡共用
function agvBody(a, c, ring, carrying){
  let fill,stroke,ringOp='0.6';
  if(a.stag>0){ fill='#ffd54a'; stroke='#c79100'; }
  else if(carrying && a.cargo==='full'){ fill='#00c853'; stroke='#0a6b2e'; }   // 載滿框=綠
  else if(carrying && a.cargo==='empty'){ fill='#ff9800'; stroke='#b35e00'; }   // 載空框=橘
  else if(a.phase==='picking'){ fill='#eef2f8'; stroke='#00a040'; }             // 取料中（空手）
  else { fill='#eef2f8'; stroke='#90a0bc'; if(a.phase==='idle')ringOp='0.3'; }  // 空手/去取料/idle
  c.setAttribute('style',`fill:${fill};stroke:${stroke};stroke-width:2.5`);
  if(ring) ring.setAttribute('opacity',ringOp);
}
function updateABFAgvPos(a){
  const g=document.getElementById(`agv-${a.id}`);
  const c=document.getElementById(`ac-${a.id}`);
  const ring=document.getElementById(`aring-${a.id}`);
  const cd=document.getElementById(`acd-${a.id}`);
  if(!g||!c) return;

  let x, ty;
  if(a.phase==='idle'||a.phase==='picking'||a.phase==='dropping'||a.toPos<0){
    x  = abfSt[a.pos]?.x||0;
    ty = abfSt[a.pos]?.y||ABF_TY_FWD;
  } else {
    const from=abfSt[a.fromPos], to=abfSt[a.toPos];
    const sx=from?.x||0, dx=to?.x||0;
    // 前進軌道：蛇形用站序(下游)、單列用 x 方向（與 ABF 原行為一致）
    const fwd = LC.layout.type==='serpentine' ? (a.toPos>a.fromPos) : (dx>=sx);
    const sy = fwd ? (from?.tfy ?? ABF_TY_FWD) : (from?.tyr ?? ABF_TY_RET);
    const dy = fwd ? (to?.tfy ?? ABF_TY_FWD) : (to?.tyr ?? ABF_TY_RET);
    x  = sx+(dx-sx)*a.legPos;
    ty = sy+(dy-sy)*a.legPos;
  }
  g.setAttribute('transform',`translate(${Math.round(x)},${Math.round(ty)})`);

  // 車身依「實際載貨」用飽和色：載滿框=鮮綠、載空框=鮮藍、空手=淡灰、等待=琥珀
  const carrying = (a.phase==='delivering'||a.phase==='dropping');
  agvBody(a, c, ring, carrying);

  // 車頂載貨標記：載滿框=綠、載空框=橘、空手=隱藏
  if(cd){
    if(carrying && a.cargo==='full'){ cd.setAttribute('fill','#00c853');cd.setAttribute('stroke','#0a6b2e');cd.setAttribute('stroke-width','1.5'); }
    else if(carrying && a.cargo==='empty'){ cd.setAttribute('fill','#ff9800');cd.setAttribute('stroke','#b35e00');cd.setAttribute('stroke-width','1.5'); }
    else { cd.setAttribute('fill','none');cd.setAttribute('stroke','none'); }
  }

  const lbl=document.getElementById(`albl-${a.id}`);
  if(lbl){
    if(a.phase==='picking')   {lbl.textContent=`取 ${Math.ceil(a.pickWait)}s`;  lbl.setAttribute('style','font-size:9px;font-weight:bold;fill:#00922f');}
    else if(a.phase==='dropping'){lbl.textContent=`放 ${Math.ceil(a.dropWait)}s`; lbl.setAttribute('style','font-size:9px;font-weight:bold;fill:#1565c0');}
    else if(a.stag>0)         {lbl.textContent='等待';lbl.setAttribute('style','font-size:9px;font-weight:bold;fill:#c79100');}
    else                      {lbl.textContent='';}
  }
}

function calcUPH(comps,now,bt){
  const win=3600,recent=comps.filter(t=>t>now-win);
  if(!recent.length)return 0;
  const el=Math.min(now,win);
  if(el<120)return 0;
  return Math.round(recent.length*bt/el*3600);
}

  const min=Math.floor(simT/60);

  cdata.smk.push(selectedLine==='smk'?uph:null);

    chart.data.labels=cdata.labels;
    chart.data.datasets[0].data=cdata.abf;
    chart.data.datasets[1].data=cdata.smk;
    chart.update('none');
  }
}

function parseMMSS(s){
  const p=String(s).split(':');
  if(p.length===2){const m=+p[0],ss=+p[1];if(!isNaN(m)&&!isNaN(ss)&&m>=0&&ss<60)return m*60+ss;}

function stepField(key,dir){
  const m=PARAM_BY_KEY[key];const el=document.getElementById('p-'+key);
  if(!m||!el)return;
  let v=+el.value||0; v+=dir*(m.step||1);
  if(m.min!=null)v=Math.max(m.min,v);
  if(m.max!=null)v=Math.min(m.max,v);
  el.value=v; validateField(m); refreshDirty();
}

// ── 驗證（inline，取代 alert）──
function readField(m){
  const el=document.getElementById('p-'+m.key);
  if(!el) return {ok:false,val:null,msg:'缺少欄位'};
  if(m.type==='mmss'){
    const v=parseMMSS(el.value);
    return v==null?{ok:false,val:null,msg:'格式須為 分:秒（秒 < 60）'}:{ok:true,val:v};
  }
  const raw=String(el.value).trim();
  if(raw===''||isNaN(+raw)) return {ok:false,val:null,msg:'請輸入數字'};
  const v=+raw;
  if(m.min!=null&&v<m.min) return {ok:false,val:null,msg:`不可小於 ${m.min}`};
  if(m.max!=null&&v>m.max) return {ok:false,val:null,msg:`不可大於 ${m.max}`};
  return {ok:true,val:v};
}
function validateField(m){
  const pg=document.getElementById('pg-'+m.key);const r=readField(m);
  if(pg){pg.classList.toggle('invalid',!r.ok);const e=pg.querySelector('.err');if(e)e.textContent=r.ok?'':r.msg;}
  return r.ok;
}
function relevant(m){return m.line==='both'||m.line===selectedLine;}
function validateAll(){
  let firstBad=null,ok=true;
  for(const m of ALL_META){ if(!relevant(m))continue; if(!validateField(m)){ok=false;if(!firstBad)firstBad=m.key;} }
  const btn=document.getElementById('btn-apply'); if(btn) btn.disabled=!ok;
  return {ok,firstBad};
}
function readInputs(){
  const out={...P};
  for(const m of ALL_META){const r=readField(m);if(r.ok)out[m.key]=r.val;}
  return out;
}
function changedSets(inp){
  const live=[],resim=[];
  for(const m of ALL_META){ if(!relevant(m))continue; if(inp[m.key]!==P[m.key]) (m.apply==='live'?live:resim).push(m); }
  return {live,resim};
}
function refreshDirty(){
  const v=validateAll();const ind=document.getElementById('dirty-ind');const btn=document.getElementById('btn-apply');
  if(!ind||!btn)return;
  if(!v.ok){ind.className='';ind.textContent='⚠ 有欄位無效，無法套用';btn.classList.remove('hot');return;}
  const {live,resim}=changedSets(readInputs());
  if(!live.length&&!resim.length){ind.className='clean';ind.textContent='';btn.classList.remove('hot');}
  else if(resim.length){ind.className='';ind.textContent='● 參數已變更，畫面正在跑舊參數（需重跑）';btn.classList.add('hot');}
  else {ind.className='live';ind.textContent='⚡ 即時參數已變更，套用後立即生效';btn.classList.add('hot');}
}

// ── 套用（方案 B：即時 vs 重跑）──
function applyP(){
  const v=validateAll();
  if(!v.ok){const el=document.getElementById('p-'+v.firstBad);if(el)el.focus();return;}
  const inp=readInputs();
  const before=snapshotStats();
  const {live,resim}=changedSets(inp);
  const autoplay=document.getElementById('chk-autoplay')&&document.getElementById('chk-autoplay').checked;
  if(resim.length){
    P={...P,...inp};
    persistActiveScenario();
    resetSim();
    if(autoplay&&!running) togglePlay();
    showCompareCard(before,'重新模擬');
  } else if(live.length){
    for(const m of live) applyLiveParam(m.key,inp[m.key]);
    persistActiveScenario();
    markLiveChange(live.map(m=>m.label.replace('🎯 ','')).join('、'));
    updateUI();
    showCompareCard(before,'即時套用：'+live.map(m=>m.label.replace('🎯 ','')).join('、'));
  }
  refreshDirty();
}
function applyLiveParam(key,val){
  // SMK 改 ABF 式固定分組後，即時參數僅剩目標產量
  if(key==='tg'){P.tg=val;const t=document.getElementById('s-tgt');if(t)t.textContent=val+' 片';}
}

// ── 套用前後對比卡 ──
function snapshotStats(){
  // 作用線產出一律在 abfPcs/abfOut（一般化引擎）
  const tot=abfPcs;
  const uph=calcUPH(abfOut,simT,curBatch());
  let eta='—'; if(uph>0&&tot<P.tg) eta=fmt(simT+(P.tg-tot)/uph*3600);
  return {uph,eta,done:tot,simT};
}
function showCompareCard(before,label){
  cmpState={before,label};
  const card=document.getElementById('cmp-card');if(!card)return;
  card.classList.add('show');
  // 骨架只建一次（✕ 按鈕穩定不被每幀重建，才點得到）；數值由 renderCompareCard 更新
  card.innerHTML=`<h4>已套用：${label}<span class="cmpx" onclick="hideCompareCard()">✕</span></h4>`
    +`<div class="crow"><span>UPH</span><span id="cmp-uph"></span></div>`
    +`<div class="crow"><span>預估完成</span><span id="cmp-eta"></span></div>`
    +`<div class="crow"><span>已完成</span><span id="cmp-done"></span></div>`;
  renderCompareCard();
}
function renderCompareCard(){
  if(!cmpState)return;
  const a=snapshotStats(),b=cmpState.before;
  const arr=(av,bv)=>{if(av===bv)return '<span class="eq">—</span>';const up=av>bv;return `<span class="${up?'up':'dn'}">${up?'▲':'▼'} ${up?'+':''}${av-bv}</span>`;};
  const u=document.getElementById('cmp-uph');  if(u) u.innerHTML=`${b.uph} → ${a.uph} ${arr(a.uph,b.uph)}`;
  const e=document.getElementById('cmp-eta');  if(e) e.textContent=`${b.eta} → ${a.eta}`;
  const d=document.getElementById('cmp-done'); if(d) d.textContent=`${a.done} 片`;
}
function hideCompareCard(){cmpState=null;const c=document.getElementById('cmp-card');if(c)c.classList.remove('show');}
// 即時變更時間軸註記（保留可追溯性）
function markLiveChange(summary){
  liveMarks.push(`${fmt(simT).slice(3)} ${summary}`);
  if(liveMarks.length>6) liveMarks=liveMarks.slice(-6);
  renderLiveMarks();
}
function renderLiveMarks(){
  let el=document.getElementById('live-marks');
  if(!el){
    const cw=document.getElementById('cw');if(!cw)return;
    cw.style.position='relative';
    el=document.createElement('div');el.id='live-marks';
    el.style.cssText='position:absolute;top:4px;right:8px;font-size:10px;font-weight:600;color:#a06400;text-align:right;pointer-events:none;line-height:1.4;text-shadow:0 0 3px #fff;z-index:5';
    cw.appendChild(el);
  }
  el.innerHTML=liveMarks.length?('⚡即時變更<br>'+liveMarks.join('<br>')):'';
}

// ── 路段時間迷你示意圖（段 ↔ 欄位雙向 highlight）──
function buildRouteMap(){
  const svg=document.getElementById('route-map');if(!svg)return;
  if(selectedLine==='smk'){ buildSMKRouteMap(svg); return; }
  const names=['CLN','Ann','CZ','Bak','壓','Pos','換'];
  const xi=i=>20+i*40, yb=26;
  let h='';
  [['0_1',0,1],['1_2',1,2],['2_3',2,3],['3_4',3,4],['4_5',4,5],['5_6',5,6]].forEach(([k,a,b])=>{
    h+=`<line class="rseg" data-seg="${k}" x1="${xi(a)}" y1="${yb}" x2="${xi(b)}" y2="${yb}"/>`;});
  [['0_2',0,2,46],['2_4',2,4,58],['4_6',4,6,70]].forEach(([k,a,b,yy])=>{
    const x1=xi(a),x2=xi(b),mx=(x1+x2)/2;
    h+=`<path class="rseg" data-seg="${k}" d="M${x1} ${yb+3} Q ${mx} ${yy} ${x2} ${yb+3}" fill="none"/>`;});
  names.forEach((n,i)=>{h+=`<circle cx="${xi(i)}" cy="${yb}" r="3" fill="#8090b0"/><text x="${xi(i)}" y="${yb-7}">${n}</text>`;});
  svg.innerHTML=h;
  const hot=(segk,on)=>{const s=svg.querySelector(`.rseg[data-seg="${segk}"]`);if(s)s.classList.toggle('hot',on);const pg=document.getElementById('pg-'+SEG_TO_KEY[segk]);if(pg)pg.classList.toggle('hot',on);};
  svg.querySelectorAll('.rseg').forEach(seg=>{
    const segk=seg.getAttribute('data-seg');
    seg.addEventListener('mouseenter',()=>hot(segk,true));
    seg.addEventListener('mouseleave',()=>hot(segk,false));
    seg.addEventListener('click',()=>{const el=document.getElementById('p-'+SEG_TO_KEY[segk]);if(el){el.focus();if(el.select)el.select();}});
  });
  Object.entries(SEG_TO_KEY).forEach(([segk,key])=>{
    const pg=document.getElementById('pg-'+key);if(!pg)return;
    pg.addEventListener('mouseenter',()=>hot(segk,true));
    pg.addEventListener('mouseleave',()=>hot(segk,false));
  });
}
// SMK 路段示意圖：線性 11 站、10 相鄰段(s0..s9) + 4 回程直達弧(d02/d24/d68/d810)
function buildSMKRouteMap(svg){
  const names=['CLN','Ann','CZ','Bak','壓','曝','顯','SB','UVQ','Pos','換'];
  const px=i=>14+i*25, yb=30;
  const k2key=segk=> segk[0]==='d' ? 'smkD'+segk.slice(1) : 'smkR'+segk.slice(1); // 's3'→smkR3 / 'd02'→smkD02
  let h='';
  for(let k=0;k<10;k++)
    h+=`<line class="rseg" data-seg="s${k}" x1="${px(k)}" y1="${yb}" x2="${px(k+1)}" y2="${yb}"/>`;
  [['d02',0,2,50],['d24',2,4,60],['d68',6,8,50],['d810',8,10,60]].forEach(([k,a,b,yy])=>{
    const x1=px(a),x2=px(b),mx=(x1+x2)/2;
    h+=`<path class="rseg" data-seg="${k}" d="M${x1} ${yb+3} Q ${mx} ${yy} ${x2} ${yb+3}" fill="none"/>`;});
  names.forEach((n,i)=>{h+=`<circle cx="${px(i)}" cy="${yb}" r="2.5" fill="#8090b0"/><text x="${px(i)}" y="${yb-7}" style="font-size:7px">${n}</text>`;});
  svg.innerHTML=h;
  const hot=(segk,on)=>{const s=svg.querySelector(`.rseg[data-seg="${segk}"]`);if(s)s.classList.toggle('hot',on);const pg=document.getElementById('pg-'+k2key(segk));if(pg)pg.classList.toggle('hot',on);};
  svg.querySelectorAll('.rseg').forEach(seg=>{
    const segk=seg.getAttribute('data-seg');
    seg.addEventListener('mouseenter',()=>hot(segk,true));
    seg.addEventListener('mouseleave',()=>hot(segk,false));
    seg.addEventListener('click',()=>{const el=document.getElementById('p-'+k2key(segk));if(el){el.focus();if(el.select)el.select();}});
  });
  ['s0','s1','s2','s3','s4','s5','s6','s7','s8','s9','d02','d24','d68','d810'].forEach(segk=>{
    const pg=document.getElementById('pg-'+k2key(segk));if(!pg)return;
    pg.addEventListener('mouseenter',()=>hot(segk,true));
    pg.addEventListener('mouseleave',()=>hot(segk,false));
  });
}

// ── 具名情境（scenario-presets）localStorage v2 ──
const BUILTIN_SCENARIOS={
  '理想節拍':{line:null,params:{...DEF}},
  '瓶頸情境':{line:null,params:{...DEF, czTime:DEF.czTime+180, pressTime:DEF.pressTime+180, smkCz:DEF.smkCz+180, smkPress:DEF.smkPress+180}},
  '客戶現況':{line:null,params:{...DEF}},
};
function cloneBuiltins(){const o={};for(const k in BUILTIN_SCENARIOS)o[k]={line:BUILTIN_SCENARIOS[k].line,params:{...BUILTIN_SCENARIOS[k].params}};return o;}
function loadScenarioStore(){
  try{
    const raw=localStorage.getItem('sim-scenarios');
    if(raw){const o=JSON.parse(raw);if(o&&o.version===2&&o.presets)return o;}
    const old=localStorage.getItem('sim-params'); // 遷移舊版單組參數
    if(old){const p=JSON.parse(old);return {version:2,active:'匯入設定',presets:Object.assign(cloneBuiltins(),{'匯入設定':{line:null,params:{...DEF,...p}}})};}
  }catch(_){}
  return {version:2,active:'理想節拍',presets:cloneBuiltins()};
}
function saveScenarioStore(){try{localStorage.setItem('sim-scenarios',JSON.stringify(scnStore));}catch(_){}}
function persistActiveScenario(){
  if(!scnStore)scnStore=loadScenarioStore();
  const name=scnStore.active;
  if(!(name in BUILTIN_SCENARIOS)) scnStore.presets[name]={line:selectedLine,params:{...P}}; // 不覆寫內建範本
  saveScenarioStore();
}
function onScenarioPick(name){
  if(!scnStore)scnStore=loadScenarioStore();
  scnStore.active=name;
  const sc=scnStore.presets[name];if(sc)applyParamsToInputs({...DEF,...sc.params});
  saveScenarioStore();refreshDirty();
}
function saveScenarioAs(){
  const name=prompt('情境名稱：');if(!name)return;
  if(!scnStore)scnStore=loadScenarioStore();
  scnStore.presets[name]={line:selectedLine,params:{...readInputs()}};
  scnStore.active=name;saveScenarioStore();rebuildScenarioOptions(name);
}
function rebuildScenarioOptions(active){
  const sel=document.getElementById('scenario-sel');if(!sel||!scnStore)return;
  sel.innerHTML=Object.keys(scnStore.presets).map(n=>`<option value="${n}">${n}</option>`).join('');
  sel.value=active||scnStore.active;
}
function exportParams(){
  const name=(scnStore&&scnStore.active)||'scenario';
  const data=JSON.stringify({type:'sim-scenario',name,line:selectedLine,params:readInputs()},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`scenario-${name}.json`;a.click();URL.revokeObjectURL(a.href);
}
function showImportError(msg){const ind=document.getElementById('dirty-ind');if(ind){ind.className='';ind.textContent='⚠ '+msg;}}
function importParams(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const obj=JSON.parse(ev.target.result);
      const params=obj.params||obj;
      const name=obj.name||file.name.replace(/\.json$/,'');
      if(!scnStore)scnStore=loadScenarioStore();
      scnStore.presets[name]={line:obj.line||selectedLine,params:{...DEF,...params}};
      scnStore.active=name;saveScenarioStore();rebuildScenarioOptions(name);
      applyParamsToInputs({...DEF,...params});refreshDirty();
    }catch(_){ showImportError('JSON 格式錯誤，請確認檔案內容'); }
    e.target.value='';
  };
  reader.readAsText(file);
}
function applyParamsToInputs(p){
  for(const m of ALL_META){
    const el=document.getElementById('p-'+m.key);if(!el)continue;
    const val=p[m.key];if(val==null)continue;
    el.value=(m.type==='mmss')?fmtMMSS(val):val;
  }
  ALL_META.forEach(m=>validateField(m));
}
function resetP(){applyParamsToInputs(DEF);refreshDirty();}

function fmt(s){
  s=Math.max(0,s);
  const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=Math.floor(s%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}
